<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 2</title>
</head>
<body>
    <button onmouseover="kolor()" id="przycisk">tekst</button>
</body>
<script>
    function kolor()
    {
        document.querySelector("button").style.background = "red";
        var przycisk = document.getElementById("przycisk")
        przycisk.innerHTML = "zmieniony tekst";
    }
</script>
</html>
