<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 1</title>
</head>
<body>
    <img src="img/pou.png" alt="pou" onmouseover="ramka()" onmouseout="bezramki()">
</body>
<script>
    function ramka()
    {
        document.querySelector("img").style.border = "5px solid red";
    }
    function bezramki ()
    {
        document.querySelector("img").style.border = "none";
    }
</script>
</html>
