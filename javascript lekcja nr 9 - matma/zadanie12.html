<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zadanie 12</title>
</head>
<body>
<form >
  <input type="number" id="dol" placeholder="tangens">
  <button type="button" onclick="antyzakola()">oblicz</button>
</form>
<p id="odp">

</p>
<!-- juz nawet nie chce mi sie zmieniac nazw zmiennych itp. -->
</body>
<script>
  function antyzakola() {
    var liczba = document.getElementById("dol").value
    var dol = Math.tan(liczba)
    var odp = document.getElementById("odp")
    odp.innerHTML = dol
  }
</script>
</html>
