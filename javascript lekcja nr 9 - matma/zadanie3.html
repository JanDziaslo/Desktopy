<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 3</title>
</head>
<body>
<form >
    <input type="number" id="ex" placeholder="opa">
    <button type="button" onclick="e()">Euler</button>
</form>
<p id="odp">

</p>
</body>
<script>
    function e(){
        var liczba = document.getElementById("ex").value
        var ex = Math.exp(liczba)
        var odp = document.getElementById("odp")
        odp.innerHTML = ex
    }

</script>
</html>
