<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zadanie 9</title>
</head>
<body>
<form >
  <input type="number" id="dol" placeholder="zaokraglanie">
  <button type="button" onclick="antyzakola()">zaokraglij</button>
</form>
<p id="odp">

</p>
<!-- juz nawet nie chce mi sie zmieniac nazw zmiennych itp. -->
</body>
<script>
  function antyzakola() {
    var liczba = document.getElementById("dol").value
    var dol = Math.round(liczba)
    var odp = document.getElementById("odp")
    odp.innerHTML = dol
  }
</script>
</html>
