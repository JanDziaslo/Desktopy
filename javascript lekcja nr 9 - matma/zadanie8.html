<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 8</title>
</head>
<body>
<form >
    <input type="number" id="mini1" placeholder="podaj pierwsza liczbe">
    <input type="number" id="mini2" placeholder="podaj druga liczbe">
    <button type="button" onclick="mini()">Sprawdz</button>
</form>
<p id="odp">

</p>
<!-- juz nawet nie chce mi sie zmieniac nazw zmiennych itp. -->
</body>
<script>
    function mini() {
        var liczba1 = document.getElementById("mini1").value
        var liczba2 = document.getElementById("mini2").value
        var odp = document.getElementById("odp")
        var min = Math.pow(liczba1, liczba2)
        odp.innerHTML = min

    }

</script>
</html>
