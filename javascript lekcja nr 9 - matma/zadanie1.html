<html lang="pl">

<body>

        <button type="button" onclick="bez()">oblicz</button>
    </form>
    <p id="odp">

    </p>
</body>
<script>

        console.log(bez)
        var odp = document.getElementById("odp")
        odp.innerHTML = bez
    }
