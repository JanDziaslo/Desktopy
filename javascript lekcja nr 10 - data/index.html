<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Obiekt date</title>
</head>
<body>
<h1>Zadanie 1</h1>
<script>
    let data = new Date();
    document.write(data);
</script>
<h1>Zadanie 2</h1>
<div id="2"></div>
<script>
    let dzien = data.getDate ();
    let miesiac = data.getMonth () + 1;
    let rok = data.getFullYear ();
    document.getElementById("2").innerHTML = dzien + "." + miesiac + "." + rok;
</script>
<h1>Zadanie 3</h1>
<div id="3"></div>
<script>
    let godzina = data.getHours();
    let minuta = data.getMinutes();
    let sekunda = data.getSeconds();
    document.getElementById("3").innerHTML = godzina + ":" + minuta + ":" + sekunda;
</script>
